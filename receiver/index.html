<!DOCTYPE html>
<!--
  Cast4TV custom Web Receiver (CAF).

  The Default Media Receiver (CC1AD845) cannot play Widevine-protected content.
  M4 Sport's live stream is Widevine DASH, so we need this custom receiver to:
    1. read the license server URL (+ optional headers) the sender puts in
       `media.customData`, and
    2. configure the CAF PlayerManager to fetch a Widevine license and decrypt
       the stream on the TV.

  HOST THIS FILE at a stable HTTPS URL and register that URL as a "Custom
  Receiver" in the Google Cast SDK Developer Console. Put the resulting
  Application ID into app.json (`react-native-google-cast` → `receiverAppId`).
  See receiver/README.md for step-by-step instructions.
-->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cast4TV Receiver</title>
    <!-- CAF receiver SDK -->
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
      }
      cast-media-player {
        --background-color: #000;
        --splash-image: url("https://upload.wikimedia.org/wikipedia/hu/thumb/f/fd/M4_logo.png/1200px-M4_logo.png");
      }
    </style>
  </head>
  <body>
    <cast-media-player></cast-media-player>

    <script>
      const context = cast.framework.CastReceiverContext.getInstance();
      const playerManager = context.getPlayerManager();

      // Intercept every LOAD request. If the sender attached DRM info in
      // customData, build a PlaybackConfig that points the receiver at M4's
      // Widevine license server and forwards any custom license headers.
      playerManager.setMessageInterceptor(
        cast.framework.messages.MessageType.LOAD,
        (loadRequest) => {
          try {
            const media = loadRequest && loadRequest.media;
            const customData = (media && media.customData) || {};
            const licenseUrl = customData.licenseUrl;

            // Log EXACTLY what the sender delivered. If customData is empty
            // here, react-native-google-cast didn't forward mediaInfo.customData
            // and licenseUrl will be undefined (Widevine never gets configured).
            console.log(
              "[Cast4TV receiver] LOAD:",
              JSON.stringify({
                contentUrl: media && (media.contentUrl || media.contentId),
                contentType: media && media.contentType,
                streamType: media && media.streamType,
                customData,
              })
            );

            if (licenseUrl) {
              // Start from the current playback config so we don't clobber
              // other defaults, then layer Widevine settings on top.
              const playbackConfig = Object.assign(
                new cast.framework.PlaybackConfig(),
                playerManager.getPlaybackConfig()
              );

              playbackConfig.licenseUrl = licenseUrl;
              playbackConfig.protectionSystem =
                cast.framework.ContentProtection.WIDEVINE;

              // Forward custom headers (Referer/Origin, etc.) onto the license
              // POST. NOTE: browsers treat Referer/Origin as "forbidden"
              // request headers and may strip them; connectmedia's DRM server
              // primarily authorizes on the IP-bound token in the manifest URL,
              // so this is best-effort and usually not required.
              const licenseHeaders = customData.licenseHeaders;
              if (licenseHeaders) {
                playbackConfig.licenseRequestHandler = (requestInfo) => {
                  requestInfo.headers = Object.assign(
                    {},
                    requestInfo.headers,
                    licenseHeaders
                  );
                };
              }

              loadRequest.playbackConfig = playbackConfig;
              console.log("[Cast4TV receiver] Widevine configured:", licenseUrl);
            } else {
              console.warn(
                "[Cast4TV receiver] NO licenseUrl in customData — Widevine NOT configured. DRM playback will fail."
              );
            }
          } catch (e) {
            console.error("[Cast4TV receiver] LOAD interceptor error:", e);
          }
          return loadRequest;
        }
      );

      // Map CAF's numeric detailedErrorCode back to a readable name so the
      // console tells us WHICH layer failed (MEDIAKEYS_* = DRM/license,
      // DASH_*/SEGMENT_* = manifest/segment fetch, NETWORK_* = transport).
      const ERROR_NAMES = Object.entries(
        cast.framework.events.DetailedErrorCode || {}
      ).reduce((acc, [name, code]) => {
        acc[code] = name;
        return acc;
      }, {});

      // Log the raw license request/response so we can see if the DRM server
      // rejects the Chromecast's challenge (status, headers actually sent).
      playerManager.addEventListener(
        cast.framework.events.EventType.MEDIA_STATUS,
        (event) => {
          if (event && event.mediaStatus && event.mediaStatus.idleReason) {
            console.log(
              "[Cast4TV receiver] idleReason:",
              event.mediaStatus.idleReason
            );
          }
        }
      );

      playerManager.addEventListener(
        cast.framework.events.EventType.ERROR,
        (event) => {
          const code = event && event.detailedErrorCode;
          console.error(
            "[Cast4TV receiver] ERROR:",
            JSON.stringify({
              detailedErrorCode: code,
              name: ERROR_NAMES[code],
              reason: event && event.reason,
              error: event && event.error,
            })
          );
        }
      );

      context.start();
    </script>
  </body>
</html>
